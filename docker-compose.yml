# Rapora — application stack (Django API, Celery worker + beat, SvelteKit frontend).
#
# PostgreSQL and Redis are EXTERNAL services you provide — set their connection
# details in .env (copy .env.example first). The app connects to Postgres as a
# non-superuser role so Row-Level Security is enforced; see RLS_SETUP.md to
# create the database and role.
#
#   cp .env.example .env       # then edit your values
#   docker compose up -d --build
#
# host.docker.internal resolves to the Docker host on every platform (the
# extra_hosts entry makes it work on Linux too), so a default DBHOST of
# host.docker.internal reaches a database running on the host.
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend:/app
      - /app/.venv                      # preserve image-built venv over the bind mount
      - ./docker/backend/entrypoint.sh:/entrypoint.sh:ro
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    command: /bin/bash /entrypoint.sh
    restart: unless-stopped

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend:/app
      - /app/.venv
    command: celery -A crm worker --loglevel=info
    restart: unless-stopped

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend:/app
      - /app/.venv
    command: celery -A crm beat --loglevel=info
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file: .env
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    restart: unless-stopped

volumes:
  frontend_node_modules:
